name: CI / Release

on:
  push:
    branches: [main, beta, alpha]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR/branch runs to save CI, but never cancel a release
  # branch mid-run — otherwise a fresh push could abort an in-flight publish.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/beta' && github.ref != 'refs/heads/alpha' }}

jobs:
  # ── Stage 1: Quality Gates ────────────────────────────────────────────────
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - name: Dead code & dependency check (knip)
        run: npm run knip
      - name: Doc link check
        run: npm run docs:check
      - name: Language policy check (English-only)
        run: npm run check:language

  # ── Stage 2: Tests (Node Matrix) ─────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.node == '20'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── Stage 3: Security ─────────────────────────────────────────────────────
  security:
    name: Audit & Licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Deprecated-dependency guard (#85 — block legacy transitives creeping back)
        run: npm run check:deps
      - name: Dependency Audit (production tree — what consumers install)
        # The published package ships only dist/ — no dev dependencies — so the
        # release gate audits the production tree. This blocks any vulnerability
        # that could reach a consumer while not failing on dev-only tooling.
        run: npm audit --omit=dev --audit-level=high
      - name: Dependency Audit (full tree — advisory only, non-blocking)
        run: npm audit --audit-level=high || true
      - name: License Check
        # Block only genuinely problematic copyleft licenses; permissive variants
        # (BlueOak-1.0.0, Artistic-2.0, LGPL for dynamically-linked sharp/libvips) are allowed.
        # --failOn is more robust than --onlyAllow because it handles compound SPDX expressions
        # like "(MIT OR CC0-1.0)" without requiring every format variant to be enumerated.
        run: >
          npx license-checker-rseidelsohn
          --failOn "GPL-2.0-only;GPL-2.0-or-later;GPL-3.0-only;GPL-3.0-or-later;AGPL-3.0-only;AGPL-3.0-or-later;SSPL-1.0;BUSL-1.1;Commons-Clause"

  # ── Stage 4: Build & Validate ─────────────────────────────────────────────
  build-validate:
    name: Build & Validate Package
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Validate Exports (publint)
        run: npx publint
      - name: Validate Type Declarations (attw)
        run: npx attw --pack . --ignore-rules no-resolution
      - name: Consumer ESM Test
        run: node __tests__/e2e/consumer-esm.mjs
      - name: Consumer CJS Test
        run: node __tests__/e2e/consumer-cjs.cjs
      - name: Install/Init Path Test (regression for #25)
        run: node __tests__/e2e/install-init.mjs
      - name: MCP stdio Start Test (regression for #43)
        run: node __tests__/e2e/mcp-stdio-start.mjs
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # Release runs in a dedicated workflow (.github/workflows/release.yml) with
  # its own concurrency lane, so a busy main branch can never cancel a publish.
